<svg width="3000" height="3000" viewBox="0 0 3000 3000" xmlns="http://www.w3.org/2000/svg">
  <!-- Metallic silver circle -->
  <circle cx="1500" cy="1500" r="1500" fill="url(#silverGradient)"></circle>

  <!-- Define metallic gradient -->
  <defs>
    <radialGradient id="silverGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dcdcdc"></stop>
      <stop offset="100%" stop-color="#a8a8a8"></stop>
    </radialGradient>
  </defs>
</svg>